# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Test & Verify

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  CACHE_VERSION: v2

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 1 — LINT (3 parallel jobs, ~30 s)
  # ─────────────────────────────────────────────────────────────────────────────
  lint-html:
    name: Lint HTML
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm run lint:html

  lint-css:
    name: Lint CSS
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm run lint:css

  lint-js:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --prefer-offline
      - run: npm run lint:js

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 2 — TESTS (unit matrix + e2e, parallel after lint)
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: [lint-html, lint-css, lint-js]
    timeout-minutes: 15
    strategy:
      matrix:
        node: ['20', '22']
      fail-fast: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci --prefer-offline
      - name: Run unit tests with coverage
        run: npm run test:unit:ci
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.node == '20'
        with:
          files: ./coverage/coverage-final.json
          flags: unittests-node-${{ matrix.node }}
          fail_ci_if_error: false
      - name: Archive coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-node-${{ matrix.node }}
          path: coverage/
          retention-days: 14

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [lint-html, lint-css, lint-js]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --prefer-offline
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ env.CACHE_VERSION }}-
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Run E2E tests (3 browsers)
        run: npm run test:e2e -- --workers=1
        timeout-minutes: 15
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 3 — BUILD (~20 s, after both test jobs pass)
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Bundle
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --prefer-offline
      - name: Build CSS and JS
        run: npm run build:css && npm run build:js
      - name: Verify bundle files
        run: |
          test -f dist/style.min.css && echo "  ok  CSS bundle" || { echo "  FAIL CSS bundle missing"; exit 1; }
          test -f dist/main.min.js   && echo "  ok  JS bundle"  || { echo "  FAIL JS bundle missing";  exit 1; }
      - name: Performance budget check
        run: node scripts/performance-budget.js
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 4 — LIGHTHOUSE (on PRs only, after build)
  # ─────────────────────────────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --prefer-offline
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: dist/
      - name: Start local server (serving project root)
        run: |
          npx http-server . -p 8000 -c-1 --silent &
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000 > /dev/null && break
            sleep 1
          done
          echo "  ok  server ready on :8000"
      - name: Run Lighthouse audit
        run: |
          npx lighthouse http://localhost:8000 \
            --chrome-flags="--headless=new --no-sandbox --disable-gpu" \
            --output-path=./lighthouse-report.html \
            --output=html \
            --quiet || true
      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: lighthouse-report.html
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # FINAL — SUMMARY
  # ─────────────────────────────────────────────────────────────────────────────
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint-html, lint-css, lint-js, unit-tests, e2e-tests, build]
    if: always()
    steps:
      - name: Evaluate all results
        run: |
          failed=0
          for entry in \
            "lint-html:${{ needs.lint-html.result }}" \
            "lint-css:${{ needs.lint-css.result }}" \
            "lint-js:${{ needs.lint-js.result }}" \
            "unit-tests:${{ needs.unit-tests.result }}" \
            "e2e-tests:${{ needs.e2e-tests.result }}" \
            "build:${{ needs.build.result }}"; do
            name="${entry%%:*}"
            result="${entry##*:}"
            if [ "$result" = "failure" ]; then
              echo "  FAIL $name"
              failed=1
            else
              echo "  ok   $name ($result)"
            fi
          done
          exit $failed
