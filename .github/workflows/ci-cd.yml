# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Compliance — SEO, Security & Bundle Integrity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  seo-validation:
    name: SEO & Structured Data
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate required meta tags
        run: |
          failed=0
          check() {
            if grep -q "$2" index.html; then
              echo "  ok  $1"
            else
              echo "  FAIL $1 (pattern: $2)"
              failed=1
            fi
          }
          check "charset"       '<meta charset'
          check "viewport"      'name="viewport"'
          check "description"   'name="description"'
          check "og:title"      'og:title'
          check "canonical"     'rel="canonical"'
          check "schema.org"    'application/ld+json'
          check "CSP header"    'Content-Security-Policy'
          check "referrer"      'referrer'
          exit $failed

      - name: Validate sitemap.xml
        run: |
          test -f sitemap.xml \
            && echo "  ok  sitemap.xml ($(wc -l < sitemap.xml) lines)" \
            || { echo "  FAIL sitemap.xml MISSING"; exit 1; }

      - name: Validate robots.txt
        run: |
          test -f robots.txt \
            && echo "  ok  robots.txt" \
            || { echo "  FAIL robots.txt MISSING"; exit 1; }

  security-audit:
    name: Dependency Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit — high severity
        run: npm audit --audit-level=high

  bundle-integrity:
    name: Bundle Integrity & Performance Budget
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify dist files exist
        run: |
          test -f dist/style.min.css \
            && echo "  ok  dist/style.min.css" \
            || { echo "  FAIL dist/style.min.css missing"; exit 1; }
          test -f dist/main.min.js \
            && echo "  ok  dist/main.min.js" \
            || { echo "  FAIL dist/main.min.js missing"; exit 1; }

      - name: Check performance budget
        run: node scripts/performance-budget.js

  summary:
    name: Compliance Summary
    runs-on: ubuntu-latest
    needs: [seo-validation, security-audit, bundle-integrity]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          failed=0
          for entry in \
            "seo-validation:${{ needs.seo-validation.result }}" \
            "security-audit:${{ needs.security-audit.result }}" \
            "bundle-integrity:${{ needs.bundle-integrity.result }}"; do
            name="${entry%%:*}"
            result="${entry##*:}"
            if [ "$result" = "failure" ]; then
              echo "  FAIL $name"
              failed=1
            else
              echo "  ok   $name ($result)"
            fi
          done
          echo ""
          echo "Compliance checks completed."
          echo "Review the detailed logs above for any warnings or failures."
          exit $failed
