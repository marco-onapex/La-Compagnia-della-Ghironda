version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "marco-onapex"
    labels:
      - "dependencies"
      - "automation"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
